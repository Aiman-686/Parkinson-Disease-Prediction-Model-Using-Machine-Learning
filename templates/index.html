<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkinson Disease Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            min-height:100vh;
            color:white;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,.4);
        }

        .slider-value{
            font-weight:bold;
            color:#0d6efd;
        }

        h1{
            font-weight:bold;
        }

        .btn{
            font-size:20px;
        }

        .result{
            font-size:22px;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="container py-5">

<div class="card p-5">

<h1 class="text-center text-primary">
Parkinson Disease Prediction
</h1>

<p class="text-center text-dark">
Move each slider to enter the patient's voice measurement values.
</p>

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6">

<div class="mb-3">
<label class="form-label">MDVP:Fo(Hz)</label>
<input type="range" class="form-range" min="80" max="300" step="0.01" value="120" name="f1" oninput="v1.value=this.value">
<output id="v1" class="slider-value">120</output>
</div>

<div class="mb-3">
<label class="form-label">MDVP:Fhi(Hz)</label>
<input type="range" class="form-range" min="80" max="600" step="0.01" value="150" name="f2" oninput="v2.value=this.value">
<output id="v2" class="slider-value">150</output>
</div>

<div class="mb-3">
<label class="form-label">MDVP:Flo(Hz)</label>
<input type="range" class="form-range" min="60" max="300" step="0.01" value="100" name="f3" oninput="v3.value=this.value">
<output id="v3" class="slider-value">100</output>
</div>

<div class="mb-3">
<label class="form-label">MDVP:Jitter(%)</label>
<input type="range" class="form-range" min="0" max="0.05" step="0.0001" value="0.01" name="f4" oninput="v4.value=this.value">
<output id="v4" class="slider-value">0.01</output>
</div>

<div class="mb-3">
<label class="form-label">MDVP:Jitter(Abs)</label>
<input type="range" class="form-range" min="0" max="0.001" step="0.00001" value="0.0001" name="f5" oninput="v5.value=this.value">
<output id="v5" class="slider-value">0.0001</output>
</div>

<div class="mb-3">
<label class="form-label">MDVP:RAP</label>
<input type="range" class="form-range" min="0" max="0.03" step="0.0001" value="0.01" name="f6" oninput="v6.value=this.value">
<output id="v6" class="slider-value">0.01</output>
</div>

<div class="mb-3">
<label class="form-label">MDVP:PPQ</label>
<input type="range" class="form-range" min="0" max="0.03" step="0.0001" value="0.01" name="f7" oninput="v7.value=this.value">
<output id="v7" class="slider-value">0.01</output>
</div>

<div class="mb-3">
<label class="form-label">Jitter:DDP</label>
<input type="range" class="form-range" min="0" max="0.1" step="0.0001" value="0.03" name="f8" oninput="v8.value=this.value">
<output id="v8" class="slider-value">0.03</output>
</div>

<div class="mb-3">
<label class="form-label">MDVP:Shimmer</label>
<input type="range" class="form-range" min="0" max="0.2" step="0.0001" value="0.05" name="f9" oninput="v9.value=this.value">
<output id="v9" class="slider-value">0.05</output>
</div>

<div class="mb-3">
<label class="form-label">MDVP:Shimmer(dB)</label>
<input type="range" class="form-range" min="0" max="2" step="0.01" value="0.5" name="f10" oninput="v10.value=this.value">
<output id="v10" class="slider-value">0.5</output>
</div>

<div class="mb-3">
<label class="form-label">Shimmer:APQ3</label>
<input type="range" class="form-range" min="0" max="0.1" step="0.0001" value="0.02" name="f11" oninput="v11.value=this.value">
<output id="v11" class="slider-value">0.02</output>
</div>
<div class="mb-3">
<label class="form-label">Shimmer:APQ5</label>
<input type="range" class="form-range" min="0" max="0.2" step="0.0001" value="0.03" name="f12" oninput="v12.value=this.value">
<output id="v12" class="slider-value">0.03</output>
</div>

<div class="mb-3">
<label class="form-label">MDVP:APQ</label>
<input type="range" class="form-range" min="0" max="0.2" step="0.0001" value="0.04" name="f13" oninput="v13.value=this.value">
<output id="v13" class="slider-value">0.04</output>
</div>

<div class="mb-3">
<label class="form-label">Shimmer:DDA</label>
<input type="range" class="form-range" min="0" max="0.2" step="0.0001" value="0.05" name="f14" oninput="v14.value=this.value">
<output id="v14" class="slider-value">0.05</output>
</div>

<div class="mb-3">
<label class="form-label">NHR</label>
<input type="range" class="form-range" min="0" max="1" step="0.0001" value="0.02" name="f15" oninput="v15.value=this.value">
<output id="v15" class="slider-value">0.02</output>
</div>

<div class="mb-3">
<label class="form-label">HNR</label>
<input type="range" class="form-range" min="0" max="40" step="0.01" value="20" name="f16" oninput="v16.value=this.value">
<output id="v16" class="slider-value">20</output>
</div>

</div>

<div class="col-md-6">

<div class="mb-3">
<label class="form-label">RPDE</label>
<input type="range" class="form-range" min="0" max="1" step="0.001" value="0.5" name="f17" oninput="v17.value=this.value">
<output id="v17" class="slider-value">0.5</output>
</div>

<div class="mb-3">
<label class="form-label">DFA</label>
<input type="range" class="form-range" min="0" max="1" step="0.001" value="0.7" name="f18" oninput="v18.value=this.value">
<output id="v18" class="slider-value">0.7</output>
</div>

<div class="mb-3">
<label class="form-label">Spread1</label>
<input type="range" class="form-range" min="-10" max="1" step="0.001" value="-5" name="f19" oninput="v19.value=this.value">
<output id="v19" class="slider-value">-5</output>
</div>

<div class="mb-3">
<label class="form-label">Spread2</label>
<input type="range" class="form-range" min="0" max="1" step="0.001" value="0.2" name="f20" oninput="v20.value=this.value">
<output id="v20" class="slider-value">0.2</output>
</div>

<div class="mb-3">
<label class="form-label">D2</label>
<input type="range" class="form-range" min="0" max="5" step="0.001" value="2.5" name="f21" oninput="v21.value=this.value">
<output id="v21" class="slider-value">2.5</output>
</div>

<div class="mb-3">
<label class="form-label">PPE</label>
<input type="range" class="form-range" min="0" max="1" step="0.001" value="0.2" name="f22" oninput="v22.value=this.value">
<output id="v22" class="slider-value">0.2</output>
</div>

</div>

</div>

<div class="text-center mt-4">
<button type="submit" class="btn btn-primary btn-lg px-5">
Predict
</button>
</div>

</form>

{% if message %}
<div class="alert alert-{{color}} text-center mt-4 result">
{{message}}
</div>
{% endif %}

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
